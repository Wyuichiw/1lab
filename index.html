<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твій найкрутіший котик 😎🐾</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgb(252, 215, 136);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px #0000001a;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-top: 0;
            margin-bottom: 10px;
        }
        img {
            border-radius: 10px;
            max-width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain; 
        }
        .desc-text {
            margin-top: 15px;
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Подивись на цього крутого котика! 🕶️🐾</h1>
        
        <img src="Мур.jpg" alt="Крутий котик у сонячних окулярах">
        
        <p class="desc-text">Ось такий він стиляга! Безумовно крутий)).</p>
    </div>

</body>
</html>
